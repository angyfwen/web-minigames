<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Data Sorter</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-space: #140828;
            --card-bg: #261642;
            --accent-gold: #FFD700;
            --btn-blue-top: #4FACFE;
            --btn-blue-bot: #00F2FE;
            --btn-pink-top: #FF6EC4;
            --btn-pink-bot: #7873F5;
            --btn-orange-top: #FF9966;
            --btn-orange-bot: #FF5E62;
        }

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centering for Start Screen */
            color: white;
            overflow: hidden; /* Lock scroll for game feel */
            
            /* DEEP SPACE BACKGROUND */
            background-color: var(--bg-space);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(79, 172, 254, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 110, 196, 0.2) 0%, transparent 40%),
                radial-gradient(white 1px, transparent 1px),
                radial-gradient(white 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 50px 50px, 100px 100px;
            background-position: 0 0, 0 0, 0 0, 25px 25px;
        }

        /* --- SCREENS MANAGEMENT --- */
        .screen {
            width: 100%;
            height: 100%;
            display: none; /* Hidden by default */
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .screen.active {
            display: flex;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- START SCREEN STYLES --- */
        .title-box {
            text-align: center;
            margin-bottom: 50px;
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 5rem;
            margin: 0;
            background: linear-gradient(to bottom, #FFD700, #FFA500);
            -webkit-background-clip: text;
            background-clip: text; /* FIXED: Added standard property here */
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 5px 0px rgba(0,0,0,0.5));
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #A090C0;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .start-btn {
            background: linear-gradient(to bottom, #4FACFE 0%, #00F2FE 100%);
            border: none;
            padding: 20px 60px;
            border-radius: 50px;
            font-family: 'Fredoka One', cursive;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            box-shadow: 0px 8px 0px #00A8B5, 0px 20px 30px rgba(0,0,0,0.4);
            transition: transform 0.1s;
            text-transform: uppercase;
        }

        .start-btn:active {
            transform: translateY(8px);
            box-shadow: 0px 0px 0px #00A8B5;
        }

        .start-btn:hover {
            filter: brightness(1.1);
        }

        /* --- GAME SCREEN STYLES --- */
        .game-board {
            width: 90%;
            max-width: 1000px;
            background: rgba(38, 22, 66, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 4px solid rgba(255,255,255,0.1);
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: #2E1A52;
            border-radius: 20px;
            padding: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.05);
        }

        .card-title {
            font-family: 'Fredoka One', cursive;
            font-size: 1.3rem;
            color: #4FACFE;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Stats & Progress */
        .progress-container {
            background: #150a26;
            height: 20px;
            border-radius: 15px;
            border: 2px solid #3c2a5c;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #4FACFE, #00F2FE);
            background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.2) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0.2) 75%, transparent 75%, transparent);
            background-size: 20px 20px;
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* The Arena */
        .arena {
            background: rgba(20, 10, 40, 0.6);
            border-radius: 25px;
            padding: 40px 20px;
            min-height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            border: 3px dashed rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }

        /* Orbs */
        .orb {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, #4FACFE 20%, #00F2FE 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Fredoka One', cursive;
            font-size: 2rem;
            color: #0d4663;
            text-shadow: 0px 1px 0px rgba(255,255,255,0.4);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
        }

        .orb::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 12px;
            width: 20px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
            transform: rotate(-45deg);
        }

        .orb:hover { transform: scale(1.1); }

        .orb.selected {
            background: radial-gradient(circle at 30% 30%, #fff, #FF6EC4 20%, #7873F5 100%);
            color: #521536;
            transform: scale(1.15) translateY(-10px);
            box-shadow: 0 0 25px #FF6EC4;
            z-index: 10;
        }
        
        .orb.sorted {
            background: radial-gradient(circle at 30% 30%, #fff, #42e695 20%, #3bb2b8 100%);
            color: #0f4d30;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn-game {
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-family: 'Fredoka One', cursive;
            font-size: 1rem;
            text-transform: uppercase;
            color: white;
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-blue { background: linear-gradient(to bottom, #4FACFE 0%, #00F2FE 100%); box-shadow: 0px 5px 0px #00A8B5; }
        .btn-pink { background: linear-gradient(to bottom, #FF6EC4 0%, #7873F5 100%); box-shadow: 0px 5px 0px #5954B8; }
        .btn-orange { background: linear-gradient(to bottom, #FF9966 0%, #FF5E62 100%); box-shadow: 0px 5px 0px #CC4548; }

        .btn-game:active { transform: translateY(5px); box-shadow: none; }
        .btn-game:disabled { filter: grayscale(100%); opacity: 0.5; cursor: not-allowed; }

        #status-bar {
            margin-top: 20px;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-weight: 900;
            border: 2px solid rgba(255,255,255,0.1);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* --- MENU BUTTON (Top Left) --- */
        .home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: background 0.2s;
        }
        .home-btn:hover { background: rgba(255,255,255,0.3); }

    </style>
</head>
<body>

    <div id="start-screen" class="screen active">
        <div class="title-box">
            <h1>Cosmic<br>Sorter</h1>
            <div class="subtitle">Mission: Organize Data!</div>
        </div>
        <button class="start-btn" onclick="goToGame()">
            <i class="fa-solid fa-rocket"></i> Play
        </button>
    </div>

    <div id="game-screen" class="screen">
        <button class="home-btn" onclick="goToMenu()" title="Back to Menu"><i class="fa-solid fa-house"></i></button>
        
        <div class="game-board">
            
            <div class="dashboard">
                <div class="card">
                    <div class="card-title"><i class="fa-solid fa-circle-info"></i> Mission</div>
                    <div style="font-size: 0.9rem; line-height: 1.5; color: #ddd;">
                        Sort the Orbs from <strong>Smallest</strong> to <strong>Largest</strong>. <br>
                        Use <strong>Swap</strong> or <strong>Insert</strong>.
                    </div>
                </div>

                <div class="card">
                    <div class="card-title"><i class="fa-solid fa-gauge-high"></i> Efficiency</div>
                    <div class="progress-container">
                        <div class="progress-bar" id="efficiency-bar"></div>
                    </div>
                    <div style="margin-top: 10px; font-weight: bold; font-size: 0.9rem;">
                        Moves: <span id="move-count" style="color:#FFD700">0</span>
                    </div>
                </div>
            </div>

            <div class="arena" id="orb-container"></div>

            <div class="controls">
                <button class="btn-game btn-blue" id="btn-swap" disabled>
                    <i class="fa-solid fa-arrow-right-arrow-left"></i> Swap
                </button>
                <button class="btn-game btn-pink" id="btn-insert" disabled>
                    <i class="fa-solid fa-file-import"></i> Insert
                </button>
                <button class="btn-game btn-orange" onclick="initGame()">
                    <i class="fa-solid fa-rotate-right"></i> Reset
                </button>
            </div>

            <div id="status-bar">Select 2 Orbs...</div>
        </div>
    </div>

    <script>
        // --- PAGE NAVIGATION ---
        function goToGame() {
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            initGame();
        }

        function goToMenu() {
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('start-screen').classList.add('active');
        }

        // --- GAME VARIABLES ---
        const container = document.getElementById('orb-container');
        const moveDisplay = document.getElementById('move-count');
        const statusDisplay = document.getElementById('status-bar');
        const bar = document.getElementById('efficiency-bar');
        const btnSwap = document.getElementById('btn-swap');
        const btnInsert = document.getElementById('btn-insert');

        let orbs = [];
        let selectedIndices = [];
        let moves = 0;
        const NUM_ORBS = 6;

        function initGame() {
            moves = 0;
            selectedIndices = [];
            moveDisplay.innerText = "0";
            bar.style.width = "100%";
            bar.style.background = "linear-gradient(90deg, #4FACFE, #00F2FE)";
            statusDisplay.innerText = "Mission: Sort Low to High!";
            statusDisplay.style.color = "white";

            // Generate Numbers
            let numbers = Array.from({length: NUM_ORBS}, () => Math.floor(Math.random() * 50) + 1);
            renderOrbs(numbers);
            updateButtons();
        }

        function renderOrbs(numbers) {
            container.innerHTML = "";
            orbs = numbers.map((num, index) => {
                let div = document.createElement('div');
                div.className = 'orb';
                div.innerText = num;
                div.onclick = () => selectOrb(index);
                container.appendChild(div);
                return { val: num, el: div };
            });
        }

        function selectOrb(index) {
            // Toggle Selection
            if (selectedIndices.includes(index)) {
                selectedIndices = selectedIndices.filter(i => i !== index);
                orbs[index].el.classList.remove('selected');
            } else {
                if (selectedIndices.length < 2) {
                    selectedIndices.push(index);
                    orbs[index].el.classList.add('selected');
                }
            }
            
            selectedIndices.sort((a, b) => a - b);
            updateUI();
        }

        function updateUI() {
            updateButtons();
            if (selectedIndices.length === 2) {
                statusDisplay.innerText = "Tools Active! Choose SWAP or INSERT.";
                statusDisplay.style.color = "#FFD700";
            } else {
                statusDisplay.innerText = "Select 2 Orbs...";
                statusDisplay.style.color = "white";
            }
        }

        function updateButtons() {
            const active = selectedIndices.length === 2;
            btnSwap.disabled = !active;
            btnInsert.disabled = !active;
        }

        // --- ACTIONS ---
        btnSwap.onclick = () => {
            if (selectedIndices.length !== 2) return;
            const [i1, i2] = selectedIndices;

            const temp = orbs[i1].val;
            orbs[i1].val = orbs[i2].val;
            orbs[i2].val = temp;

            completeMove("Swapped Orbs!");
        };

        btnInsert.onclick = () => {
            if (selectedIndices.length !== 2) return;
            const [fromIndex, toIndex] = selectedIndices;
            
            let currentNums = orbs.map(o => o.val);
            const valToMove = currentNums[fromIndex];
            
            currentNums.splice(fromIndex, 1);
            let finalDest = toIndex;
            if (fromIndex < toIndex) finalDest--; 
            
            currentNums.splice(finalDest, 0, valToMove);
            completeMove("Inserted Orb!");
            renderOrbs(currentNums);
        };

        function completeMove(actionText) {
            moves++;
            moveDisplay.innerText = moves;
            
            // Clear Selection
            orbs.forEach(o => o.el.classList.remove('selected'));
            selectedIndices = [];
            
            // Soft Re-render (update text)
            orbs.forEach(o => o.el.innerText = o.val);
            
            statusDisplay.innerText = actionText;
            updateUI();
            checkWin();
            
            // Efficiency Bar Logic
            let pct = Math.max(0, 100 - (moves * 5));
            bar.style.width = pct + "%";
            if(pct < 50) bar.style.background = "linear-gradient(90deg, #FF9966, #FF5E62)";
        }

        function checkWin() {
            const currentNums = orbs.map(o => o.val);
            const sorted = [...currentNums].sort((a,b) => a-b);
            const isWin = JSON.stringify(currentNums) === JSON.stringify(sorted);
            
            if (isWin) {
                statusDisplay.innerHTML = `<i class="fa-solid fa-star"></i> EXCELLENT! SORTED! <i class="fa-solid fa-star"></i>`;
                statusDisplay.style.color = "#42e695";
                orbs.forEach(o => o.el.classList.add('sorted'));
            }
        }
    </script>
</body>
</html>
